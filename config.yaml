# Extract of the config.yaml from the main hamstring repository.
logging:
  base:
    debug: false

pipeline:
  zeek:
    sensors:
      zeek1:
        static_analysis: true
        protocols:
          - dns
        interfaces:
          - enp2s0f0

environment:
  kafka_brokers:
    - external_port: 8097
      node_ip: 127.0.0.1
    - external_port: 8098
      node_ip: 127.0.0.1
    - external_port: 8099
      node_ip: 127.0.0.1
  kafka_topics_prefix:
    pipeline:
      logserver_in: "hamstring_input"
